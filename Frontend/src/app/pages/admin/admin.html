<div class="admin-layout">
  <!-- Navbar para Móvil -->
  <nav class="navbar navbar-dark bg-dark d-lg-none sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">Panel Admin</a>
      <button class="navbar-toggler border-0" type="button" (click)="toggleSidebar()" aria-controls="adminSidebar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
  </nav>

  <div class="d-flex admin-wrapper">
    <!-- Sidebar / Menú Lateral -->
    <aside id="adminSidebar" class="admin-sidebar bg-dark text-white p-3 shadow" [class.show]="isSidebarOpen()">
      <div class="d-none d-lg-block mb-4 text-center">
        <a href="/" class="text-white text-decoration-none">
          <img src="assets/pure-inka-logo.png" alt="Logo" class="admin-logo rounded-circle mb-2">
          <h5 class="fw-bold mb-0">Pure Inka Admin</h5>
        </a>
      </div>
      <hr class="d-none d-lg-block opacity-25">
      
      <ul class="nav nav-pills flex-column mb-auto gap-1">
        <li class="nav-item">
          <a [routerLink]="['/admin/home']" class="nav-link text-white d-flex align-items-center" 
             routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeSidebarOnMobile()">
            <i class="bi bi-speedometer2 me-3 fs-5"></i>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/admin/products']" class="nav-link text-white d-flex align-items-center" 
             routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <i class="bi bi-box-seam me-3 fs-5"></i>
            <span>Productos</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/admin/orders']" class="nav-link text-white d-flex align-items-center" 
             routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <i class="bi bi-cart-check me-3 fs-5"></i>
            <span>Pedidos</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/admin/payment-methods']" class="nav-link text-white d-flex align-items-center" 
             routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <i class="bi bi-credit-card me-3 fs-5"></i>
            <span>Pagos</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/admin/coupons']" class="nav-link text-white d-flex align-items-center" 
             routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <i class="bi bi-tags me-3 fs-5"></i>
            <span>Cupones</span>
          </a>
        </li>
        <li>
          <a [routerLink]="['/admin/tickets']" class="nav-link text-white d-flex align-items-center" 
             routerLinkActive="active" (click)="closeSidebarOnMobile()">
            <i class="bi bi-headset me-3 fs-5"></i>
            <span>Tickets</span>
          </a>
        </li>
      </ul>
      
      <hr class="opacity-25 my-4">
      
      <div class="mt-auto">
        <button (click)="logout()" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center py-2">
          <i class="bi bi-box-arrow-right me-2"></i>
          Salir
        </button>
      </div>
    </aside>

    <!-- Contenido Principal -->
    <main class="admin-content flex-grow-1 bg-light">
      <div class="container-fluid p-3 p-md-4">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
  
  <!-- Overlay para cerrar sidebar en móvil -->
  <div class="sidebar-overlay" *ngIf="isSidebarOpen()" (click)="toggleSidebar()"></div>
</div>
