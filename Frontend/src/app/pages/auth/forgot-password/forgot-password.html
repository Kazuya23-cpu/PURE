<div class="auth-container py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-3">
          <div class="card-body p-4 p-md-5">
            <h2 class="text-center mb-4">Recuperar Contraseña</h2>
            
            <div *ngIf="message" class="alert alert-success" role="alert">
              {{ message }}
            </div>
            
            <div *ngIf="error" class="alert alert-danger" role="alert">
              {{ error }}
            </div>

            
            <form *ngIf="step === 'phone'" (ngSubmit)="requestLink()">
              <p class="text-muted text-center mb-4">
                Ingresa tu número de teléfono registrado y te enviaremos un código para restablecer tu contraseña.
              </p>
              
              <div class="form-floating mb-3">
                <input type="tel" class="form-control" id="floatingPhone" placeholder="987654321" 
                       [(ngModel)]="telefono" name="telefono" required>
                <label for="floatingPhone">Número de Teléfono</label>
              </div>

              <button class="btn btn-primary w-100 py-3 mb-3" type="submit" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Enviar Código
              </button>
            </form>

            
            <form *ngIf="step === 'reset'" (ngSubmit)="resetPassword()">
              <p class="text-muted text-center mb-4">
                Hemos enviado un código a tu teléfono <strong>{{ telefono }}</strong>. Por favor, ingrésalo junto con tu nueva contraseña.
              </p>

              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingCode" placeholder="123456" 
                       [(ngModel)]="codigo" name="codigo" required maxlength="6">
                <label for="floatingCode">Código de 6 dígitos</label>
              </div>

              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingNewPassword" placeholder="Contraseña" 
                       [(ngModel)]="nuevaContrasena" name="nuevaContrasena" required>
                <label for="floatingNewPassword">Nueva Contraseña</label>
              </div>

              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingConfirmPassword" placeholder="Repetir Contraseña" 
                       [(ngModel)]="confirmarContrasena" name="confirmarContrasena" required>
                <label for="floatingConfirmPassword">Confirmar Nueva Contraseña</label>
              </div>

              <button class="btn btn-success w-100 py-3 mb-3" type="submit" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                Restablecer Contraseña
              </button>
            </form>

            <div class="text-center">
              <a routerLink="/auth/login" class="text-decoration-none">Volver al inicio de sesión</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
